name: Test Permissions Override

on:
  push:
    branches: [master]

jobs:
  test-override:
    name: Test if job permissions override root
    runs-on: ubuntu-latest
    permissions:
      contents: none # Only setting contents — other permissions deliberately omitted
    steps:
      - name: Try checkout (should fail if job-level fully overrides root)
        uses: actions/checkout@v6
      - name: Report success
        if: success()
        run: 'echo "SUCCESS: Checkout worked (merge behavior - contents inherited from root)"'
      - name: Report failure
        if: failure()
        run: 'echo "FAILED: Checkout failed (override behavior - contents: none took effect)"'
