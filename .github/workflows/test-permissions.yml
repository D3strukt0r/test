name: Test Permissions Override

on:
  push:
    branches: [master]

permissions:
  issues: write # Root sets issues: write, but job will set contents: none to test if it OVERRIDES or MERGES with root permissions

jobs:
  test-override:
    name: Test if job permissions override root
    runs-on: ubuntu-latest
    permissions:
      contents: none # Only setting contents — other permissions deliberately omitted
      issues: write
    steps:
      - name: Test write operation (create and delete a label)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Root sets issues: write. Job only sets contents: none."
          echo "If job OVERRIDES root, issues: write should be gone and label creation will fail."
          echo "If job MERGES with root, issues: write persists and label creation will succeed."
          echo ""

          echo "=== Attempting to create a temporary label (requires issues: write) ==="
          HTTP_CODE=$(curl -s -o /tmp/label.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/labels" \
            -d '{"name":"_permissions-test-temp","color":"000000","description":"Temporary label for permissions test - safe to delete"}')
          echo "Create label HTTP status: $HTTP_CODE"
          cat /tmp/label.json | jq -r '.message // .name // "unknown response"'
          echo ""

          if [ "$HTTP_CODE" = "201" ]; then
            echo "RESULT: Label created => issues: write is present => MERGE behavior (or issues inherited from root)"
            echo "Cleaning up temporary label..."
            curl -s -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/labels/_permissions-test-temp"
            echo "Cleanup done."
          elif [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "404" ]; then
            echo "RESULT: Label creation failed ($HTTP_CODE) => issues: write is NOT present => OVERRIDE behavior"
          else
            echo "RESULT: Unexpected status $HTTP_CODE"
            cat /tmp/label.json
          fi
